<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Votera AI</title>
    <meta name="description" content="Your dynamic assistant to get 100% election-ready." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Votera AI ✦</h1>
        <p>Your intelligent election assistant.</p>
      </header>


      <main class="chat-wrapper" aria-label="Chat Interface">
        <div id="chatContainer" class="chat-container"></div>
        
        <form id="chatForm" class="chat-input-area">
          <input 
            type="text" 
            id="userInput" 
            placeholder="Type your answer..." 
            autocomplete="off"
            aria-label="Type your response to the assistant"
            required
          />
          <button type="submit" id="submitBtn" aria-label="Send message">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </form>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
